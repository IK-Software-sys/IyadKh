<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>ARCHIVE | IYADKH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-cyan: #00f2ff; --dark-void: #020205; }
        body { background: var(--dark-void); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .crt-overlay { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 2000; }
        .project-card { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); transition: all 0.3s; }
        .project-card:hover { border-color: var(--neon-cyan); background: rgba(0, 242, 255, 0.08); transform: translateY(-5px); }
        .hex-btn { clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); transition: all 0.3s; }
        .hex-btn:hover { background: white; color: black; box-shadow: 0 0 20px var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="min-h-screen p-6 lg:p-20">
        <div class="mb-12 border-l-4 border-cyan-500 pl-6">
            <h1 class="text-5xl font-bold tracking-tighter uppercase italic" style="font-family: 'Orbitron';">Project Archive</h1>
            <p class="text-cyan-400 font-mono text-xs tracking-[0.3em]">RECOVERED_FILES // DATA_VAULT</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="project-card p-6 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-2 text-[10px] font-mono opacity-30">ID_XP_01</div>
                <i class="fa-solid fa-hand-sparkles text-4xl text-cyan-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2 uppercase tracking-wide">Hand Physics Pro</h3>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">
                    Experimental game using MediaPipe technology for real-time hand tracking and physics interaction.
                </p>
                <a href="physics.html" class="hex-btn inline-block bg-cyan-500 text-black px-8 py-2 font-black uppercase text-xs tracking-widest">
                    Initialize Core
                </a>
            </div>

            <div class="project-card p-6 opacity-40 border-dashed">
                <div class="flex items-center justify-center h-full">
                    <span class="font-mono text-[10px] tracking-widest">[ SLOT_AVAILABLE ]</span>
                </div>
            </div>

        </div>

        <div class="mt-20">
            <a href="index.html" class="text-cyan-500 hover:text-white transition-colors font-mono text-sm uppercase tracking-widest">
                <i class="fa-solid fa-arrow-left mr-2"></i> Return to Identity
            </a>
        </div>
    </div>
</body>
</html>
