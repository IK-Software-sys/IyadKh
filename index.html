<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>NEURAL_INTERFACE_V5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-red: #ff003c;
            --dark-void: #020205;
        }

        body, html {
            background-color: var(--dark-void);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            height: 100%;
            margin: 0;
            overflow: hidden; 
        }

        
        .crt-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 999;
        }

        .light-bleed {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 5% 5%, rgba(0, 242, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 95% 95%, rgba(255, 0, 60, 0.08) 0%, transparent 50%);
            pointer-events: none; z-index: 998;
        }

        .hazard-triangle {
            width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-bottom: 50px solid var(--neon-red);
            position: relative; filter: drop-shadow(0 0 15px var(--neon-red));
            margin-bottom: 15px;
        }

        .hazard-triangle::after {
            content: "!"; position: absolute; left: -4px; top: 20px;
            font-family: 'Orbitron'; font-weight: bold; color: white; font-size: 20px;
        }

        .hex-btn { clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        .menu-tab { clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%); }
        .octo-badge { clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%); }

        .hidden-menu { opacity: 0 !important; pointer-events: none; transform: scale(1.1); filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        
        #scroll-container {
            height: 100dvh; 
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        @media (max-width: 640px) {
            .mobile-fit { font-size: 0.85rem; }
            h1 { font-size: 2rem !important; }
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="light-bleed"></div>

    <div id="construction-overlay" class="fixed inset-0 z-[1000] bg-[#020205]/98 flex items-center justify-center backdrop-blur-xl transition-all duration-500">
        <div class="max-w-[90%] w-full p-6 border-2 border-red-600/50 text-center bg-red-950/10 shadow-[0_0_40px_rgba(255,0,60,0.2)]">
            <div class="flex justify-center"><div class="hazard-triangle"></div></div>
            <h2 class="text-red-500 font-bold text-3xl mb-4 tracking-tighter" style="font-family: 'Orbitron';">WARNING</h2>
            <p class="text-white font-mono text-[10px] mb-6 uppercase tracking-widest leading-relaxed opacity-80">
                Neural link under <span class="text-red-500 font-bold">heavy construction</span>. 
                Report glitches immediately.
            </p>
            <button onclick="dismissWarning()" class="w-full bg-red-600 text-white px-6 py-3 font-black uppercase text-xs tracking-widest hover:bg-white hover:text-red-600 transition-all">
                Acknowledge
            </button>
        </div>
    </div>

    <div id="home-menu" class="fixed inset-0 z-[500] bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center p-6 text-center transition-all duration-700">
        <div class="mb-8 relative">
            <div class="w-20 h-20 octo-badge bg-cyan-500/10 border border-cyan-500 flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-microchip text-3xl"></i>
            </div>
            <h1 class="text-4xl lg:text-7xl font-bold tracking-[0.2em] text-white italic" style="font-family: 'Orbitron';">WELCOME</h1>
            <p class="text-cyan-500 text-[8px] tracking-[0.4em] mt-2 uppercase opacity-60 font-mono">Access has been granted</p>
        </div>
        <button onclick="closeMenu()" class="menu-tab bg-cyan-500 text-black px-12 py-4 font-black uppercase text-xs tracking-widest hover:bg-white shadow-[0_0_20px_rgba(0,242,255,0.4)]">
           Initialize
        </button>
    </div>

    <div id="scroll-container">
        <audio id="bg-music" loop>
            <source src="terminal_ascent.mp3" type="audio/mpeg">
        </audio>

        <header class="flex justify-between items-center p-4 bg-black/50 border-b border-cyan-900/50 sticky top-0 z-50 backdrop-blur-md">
            <button onclick="openMenu()" class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30">
                <i class="fa-solid fa-bars-staggered text-sm"></i>
            </button>
            <div class="flex flex-col items-center">
                <span class="text-[7px] tracking-[2px] text-cyan-500 opacity-50 uppercase font-mono mb-1">Signal_Link</span>
                <div class="flex gap-1 items-center">
                    <div class="w-1 h-2 bg-cyan-500"></div><div class="w-1 h-2 bg-cyan-500"></div><div class="w-1 h-2 bg-cyan-500/20"></div>
                    <button onclick="toggleMute()" class="ml-2 text-cyan-500">
                        <i id="mute-icon" class="fa-solid fa-volume-high text-[8px]"></i>
                    </button>
                </div>
            </div>
            <button class="octo-badge bg-cyan-950/40 w-10 h-10 flex items-center justify-center border border-cyan-500/30">
                <i class="fa-solid fa-share-nodes text-sm"></i>
            </button>
        </header>

        <main class="lg:grid lg:grid-cols-2 lg:max-w-7xl lg:mx-auto w-full">
            <div class="relative w-full aspect-square lg:h-[600px] bg-black border-r border-cyan-900/20 group overflow-hidden">
                <div id="slider" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar h-full">
                    <div class="min-w-full h-full snap-center">
                        <img src="https://i.postimg.cc/jq48Cnq4/IMG-20260328-214557.jpg" class="w-full h-full object-cover grayscale-[30%]">
                    </div>
                    <div class="min-w-full h-full snap-center">
                        <img src="https://i.postimg.cc/y8QtxgPf/RDT-20260329-1808341154363770606799191.webp" class="w-full h-full object-cover grayscale-[30%]">
                    </div>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-[3px] bg-cyan-950/50">
                    <div id="progress-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#00f2ff] transition-all duration-300" style="width: 50%;"></div>
                </div>
                <div class="absolute top-4 left-4 bg-black/80 px-3 py-1 font-mono text-[9px] border border-cyan-500/30">
                    FEED_0<span id="counter">1/2</span>
                </div>
            </div>

            <div class="p-6 lg:p-20 flex flex-col justify-center">
                <div class="border-l-2 border-cyan-500 pl-4 mb-8">
                    <h1 class="text-3xl lg:text-6xl font-bold text-white uppercase tracking-tighter" style="font-family: 'Orbitron';">Status</h1>
                    <p class="text-cyan-400 font-bold text-sm tracking-widest uppercase">Encryption Active</p>
                </div>

                <div class="grid gap-2 font-mono text-[10px] mobile-fit">
                    <div class="bg-cyan-950/10 p-4 flex justify-between items-center border border-cyan-900/20">
                        <span class="opacity-50 uppercase">Admin</span>
                        <span class="text-white font-bold">IYADKH</span>
                    </div>
                    <div class="bg-cyan-950/10 p-4 flex justify-between items-center border border-cyan-900/20">
                        <span class="opacity-50 uppercase">Uplink</span>
                        <span class="text-white font-bold">+212 647 455 657</span>
                    </div>
                </div>
                
                <div class="h-32 lg:h-0"></div> 
            </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-black/95 p-3 border-t border-cyan-900/50 flex items-center justify-between z-50 backdrop-blur-xl lg:px-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 octo-badge bg-cyan-900/20 border border-cyan-500/50 flex items-center justify-center">
                    <i class="fa-solid fa-ghost text-cyan-400 text-sm"></i>
                </div>
                <p class="text-xs font-bold text-white tracking-widest hidden sm:block uppercase">IyadKh</p>
            </div>
            
            <div class="flex gap-2">
                <a href="https://wa.me/212647455657" class="hex-btn bg-black border border-cyan-900 w-10 h-10 flex items-center justify-center text-cyan-400">
                    <i class="fa-brands fa-whatsapp text-lg"></i>
                </a>
                <a href="tel:+212647455657" class="hex-btn bg-cyan-500 text-black px-6 h-10 flex items-center gap-2 font-black uppercase text-[10px] tracking-tighter">
                    <i class="fa-solid fa-bolt-lightning"></i> Establish Link
                </a>
            </div>
        </footer>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progress-bar');
        const homeMenu = document.getElementById('home-menu');
        const bgMusic = document.getElementById('bg-music');
        const muteIcon = document.getElementById('mute-icon');

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth) + 1;
            counter.innerText = `${index}/2`;
            const scrollPercent = (index / 2) * 100;
            progressBar.style.width = `${scrollPercent}%`;
        });

        function dismissWarning() {
            document.getElementById('construction-overlay').classList.add('hidden-menu');
        }

        function closeMenu() {
            homeMenu.classList.add('hidden-menu');
            bgMusic.volume = 0.3;
            bgMusic.play().catch(e => {});
        }

        function openMenu() {
            homeMenu.classList.remove('hidden-menu');
        }

        function toggleMute() {
            bgMusic.muted = !bgMusic.muted;
            muteIcon.classList.toggle('fa-volume-high', !bgMusic.muted);
            muteIcon.classList.toggle('fa-volume-xmark', bgMusic.muted);
        }
    </script>
</body>
</html>
